<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Анонимные заявки</title>

<style>
body {
  font-family: Inter, sans-serif;
  background: #f4f7f6;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 500px;
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

input, button {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 6px;
  box-sizing: border-box;
}

input {
  border: 1px solid #ddd;
}

button {
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #0056b3;
}

.post {
  background: #fff;
  border: 1px solid #eee;
  padding: 15px;
  margin-top: 10px;
  border-radius: 8px;
  width: 100%;
  max-width: 500px;
  position: relative;
}

.like-btn {
  cursor: pointer;
  border: none;
  background: #f8f9fa;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 14px;
  transition: 0.2s;
}

.like-btn:hover {
  background: #e6e6e6;
}

.time {
  font-size: 11px;
  color: #999;
  float: right;
}
</style>
</head>

<body>

<div class="container">
  <h3>Напишите анонимно</h3>
  <input type="text" id="name" placeholder="Имя профиля">
  <input type="email" id="email" placeholder="Рабочий Email">
  <button id="mainBtn">Опубликовать в облако</button>
</div>

<div id="feed" style="width:100%; max-width:500px;"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, orderBy, onSnapshot,
  serverTimestamp, updateDoc, doc, increment
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// конфигурация
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "qaaza-07e2e.firebaseapp.com",
  projectId: "qaaza-07e2e",
  storageBucket: "qaaza-07e2e.appspot.com",
  messagingSenderId: "470258480909",
  appId: "1:470258480909:web:3d47f8290c4f913b23",
  measurementId: "G-91E7MMMNN"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// лайки
window.processLike = async (id) => {
  const docRef = doc(db, "requests", id);
  try {
    await updateDoc(docRef, {
      likes: increment(1)
    });
  } catch (e) {
    console.error("Validation error:", e.message);
  }
};

// отправка
document.getElementById("mainBtn").onclick = async () => {
  const btn = document.getElementById("mainBtn");
  btn.disabled = true;

  try {
    await addDoc(collection(db, "requests"), {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      likes: 0,
      timestamp: serverTimestamp()
    });

    document.getElementById("email").value = "";
  } catch (e) {
    alert("Ошибка безопасности: Данные отклонены сервером.");
  }

  btn.disabled = false;
};

// обновление
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));

onSnapshot(q, (snapshot) => {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  snapshot.forEach((docItem) => {
    const data = docItem.data();

    feed.innerHTML += `
      <div class="post">
        <span class="time">${data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : "..."}</span>
        <b>${data.name}</b>
        <p style="margin:5px 0;">${data.email}</p>
        <button class="like-btn" onclick="processLike('${docItem.id}')">
          👍 ${data.likes || 0}
        </button>
      </div>
    `;
  });
});
</script>

</body>
</html>
