<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Анонимные заявки + DM</title>
<style>
body { font-family: Inter, sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
.container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
input, button, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; box-sizing: border-box; }
input, select { border: 1px solid #ddd; }
button { background: #007bff; color: white; border: none; cursor: pointer; transition: 0.3s; }
button:hover { background: #0056b3; }
.post, .dm-message { background: #fff; border: 1px solid #eee; padding: 15px; margin-top: 10px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; }
.like-btn, .reset-btn { cursor: pointer; border: none; background: black; padding: 5px 12px; border-radius: 20px; font-size: 14px; margin-right: 5px; transition: 0.2s; }
.like-btn:hover, .reset-btn:hover { background: #e6e6e6; }
.time { font-size: 11px; color: #999; float: right; }
.dm-message-you { background: #d1ffd1 !important; }
.dm-message-other { background: #f0f0f0 !important; }
#dmFeed { max-height: 300px; overflow-y: auto; }
</style>
</head>
<body>

<!-- 🔐 Авторизация -->
<div class="container" id="authBox">
  <button id="loginBtn">🔐 Войти через Google</button>
  <button id="logoutBtn" style="display:none;">🚪 Выйти</button>
</div>

<!-- Форма постов -->
<div class="container" id="formBox">
  <h3>Напишите анонимно</h3>
  <input type="text" id="name" placeholder="Имя профиля">
  <input type="email" id="email" placeholder="Рабочий Email">
  <button id="mainBtn">Опубликовать в облако</button>
  <button onclick="showPostCount()">📊 Сколько постов?</button>
</div>

<!-- Контейнер для DM -->
<div class="container" id="dmContainer">
  <h3>Личные сообщения</h3>
  <select id="dmUserSelect">
    <option value="">Выберите пользователя</option>
  </select>
  <input type="text" id="dmText" placeholder="Введите сообщение">
  <button id="dmSendBtn">Отправить</button>
  <div id="dmFeed"></div>
</div>

<!-- Лента постов -->
<div id="feed"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDj35E4SPS-hxo0ILX2EgnOeO6ccGNc8JI",
  authDomain: "po243-e5610.firebaseapp.com",
  projectId: "po243-e5610",
  storageBucket: "po243-e5610.firebasestorage.app",
  messagingSenderId: "351488478677",
  appId: "1:351488478677:web:f8dc387ace0feaf50c415c",
  measurementId: "G-6SDF3PG9CS"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// Авторизация
document.getElementById("loginBtn").onclick = async () => {
  try { await signInWithPopup(auth, provider); } 
  catch (e) { console.error(e); }
};
document.getElementById("logoutBtn").onclick = async () => { await signOut(auth); };

// Показ/скрытие формы
onAuthStateChanged(auth, (user) => {
  const formBox = document.getElementById("formBox");
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  if (user) {
    currentUserEmail = user.email;
    formBox.style.display = "block";
    loginBtn.style.display = "none";
    logoutBtn.style.display = "block";
    loadUsersForDM();
    loadDMFeed();
  } else {
    currentUserEmail = null;
    formBox.style.display = "none";
    loginBtn.style.display = "block";
    logoutBtn.style.display = "none";
    document.getElementById("dmUserSelect").innerHTML = '<option value="">Выберите пользователя</option>';
    document.getElementById("dmFeed").innerHTML = '';
  }
});

// ------------------ ПОСТЫ ------------------
window.processLike = async (id) => {
  const docRef = doc(db, "requests", id);
  try { await updateDoc(docRef, { likes: increment(1) }); } 
  catch (e) { console.error(e); }
};
window.resetLikes = async (id) => {
  const docRef = doc(db, "requests", id);
  try { await updateDoc(docRef, { likes: 0 }); alert("Лайки сброшены!"); } 
  catch (e) { console.error(e); alert("Ошибка"); }
};
document.getElementById("mainBtn").onclick = async () => {
  const btn = document.getElementById("mainBtn");
  btn.disabled = true;
  try {
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    if (!name || !email) { alert("Введите имя и email!"); btn.disabled = false; return; }
    await addDoc(collection(db, "requests"), { name, email, likes: 0, timestamp: serverTimestamp() });
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
  } catch (e) { console.error(e); }
  btn.disabled = false;
};
window.showPostCount = async () => {
  try {
    const snapshot = await getDocs(collection(db, "requests"));
    alert(`Всего постов: ${snapshot.size}`);
  } catch (e) { console.error(e); alert("Ошибка"); }
};
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
onSnapshot(q, (snapshot) => {
  const feed = document.getElementById("feed");
  feed.innerHTML = snapshot.docs.map(docItem => {
    const data = docItem.data();
    const timeStr = data.timestamp?.toDate ? data.timestamp.toDate().toLocaleTimeString() : "...";
    return `<div class="post">
      <span class="time">${timeStr}</span>
      <b>${data.name}</b>
      <p style="margin:5px 0;">${data.email}</p>
      <button class="like-btn" onclick="processLike('${docItem.id}')"> 👍 ${data.likes || 0} </button>
      <button class="reset-btn" onclick="resetLikes('${docItem.id}')"> ♻️ Сбросить лайки </button>
    </div>`;
  }).join('');
});

// ------------------ ЛИЧНЫЕ СООБЩЕНИЯ ------------------
let currentUserEmail = null;

// 1. Загружаем пользователей
async function loadUsersForDM() {
  try {
    const snapshot = await getDocs(collection(db, "requests"));
    const select = document.getElementById("dmUserSelect");
    select.innerHTML = '<option value="">Выберите пользователя</option>';
    snapshot.docs.forEach(docItem => {
      const data = docItem.data();
      if (data.email !== currentUserEmail) {
        const opt = document.createElement("option");
        opt.value = data.email;
        opt.textContent = data.name + " (" + data.email + ")";
        select.appendChild(opt);
      }
    });
  } catch (e) { console.error(e); }
}

// 2. Отправка сообщения
document.getElementById("dmSendBtn").onclick = async () => {
  const toEmail = document.getElementById("dmUserSelect").value;
  const text = document.getElementById("dmText").value.trim();
  if (!toEmail) return alert("Выберите пользователя!");
  if (!text) return alert("Введите сообщение!");
  try {
    await addDoc(collection(db, "dm_messages"), {
      from: currentUserEmail,
      to: toEmail,
      text,
      participants: [currentUserEmail, toEmail],
      timestamp: serverTimestamp()
    });
    document.getElementById("dmText").value = "";
  } catch (e) { console.error(e); }
};

// 3. Реактивная загрузка сообщений
function loadDMFeed() {
  const dmQuery = query(collection(db, "dm_messages"), orderBy("timestamp", "asc"));
  onSnapshot(dmQuery, (snapshot) => {
    const feed = document.getElementById("dmFeed");
    feed.innerHTML = "";
    snapshot.docs.forEach(docItem => {
      const data = docItem.data();
      if (data.participants.includes(currentUserEmail)) {
        const div = document.createElement("div");
        div.className = "dm-message " + (data.from === currentUserEmail ? "dm-message-you" : "dm-message-other");
        div.innerHTML = `<b>${data.from === currentUserEmail ? "Вы" : data.from}:</b> ${data.text}`;
        feed.appendChild(div);
        feed.scrollTop = feed.scrollHeight;
      }
    });
  });
}
</script>
</body>
</html>
