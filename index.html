<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Анонимные заявки + DM</title>

<style>
body {
  font-family: Inter, sans-serif;
  background: #f4f7f6;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 500px;
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
  margin-bottom: 15px;
}

input, button, select {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 6px;
  box-sizing: border-box;
}

button {
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
}

.post {
  background: #fff;
  border: 1px solid #eee;
  padding: 15px;
  margin-top: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div class="container">
  <button id="loginBtn">Войти через Google</button>
  <button id="logoutBtn" style="display:none;">Выйти</button>
</div>

<div class="container" id="formBox">
  <input id="name" placeholder="Имя">
  <input id="email" placeholder="Email">
  <button id="mainBtn">Создать пользователя</button>
</div>

<div class="container">
  <h3>💬 Личные сообщения</h3>
  <select id="userSelect"></select>
  <input id="dmText" placeholder="Сообщение">
  <button id="sendDm">Отправить</button>
  <div id="dmChat"></div>
</div>

<div id="feed" style="max-width:500px;"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDj35E4SPS-hxo0ILX2EgnOeO6ccGNc8JI",
  authDomain: "po243-e5610.firebaseapp.com",
  projectId: "po243-e5610"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// ===== AUTH =====
loginBtn.onclick = () => signInWithPopup(auth, provider);
logoutBtn.onclick = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
  formBox.style.display = user ? "block" : "none";
  loginBtn.style.display = user ? "none" : "block";
  logoutBtn.style.display = user ? "block" : "none";

  if (user) {
    loadUsers();
    loadMessages();
  }
});

// ===== СОЗДАНИЕ ПОЛЬЗОВАТЕЛЯ =====
mainBtn.onclick = async () => {
  await addDoc(collection(db, "requests"), {
    name: name.value,
    email: email.value,
    likes: 0,
    timestamp: serverTimestamp()
  });
};

// ===== ЗАГРУЗКА ПОЛЬЗОВАТЕЛЕЙ =====
const loadUsers = async () => {
  const snap = await getDocs(collection(db, "requests"));
  userSelect.innerHTML = "";

  snap.forEach(doc => {
    const d = doc.data();
    const opt = document.createElement("option");
    opt.value = d.email;
    opt.textContent = d.name + " (" + d.email + ")";
    userSelect.appendChild(opt);
  });
};

// ===== ОТПРАВКА DM =====
sendDm.onclick = async () => {
  const user = auth.currentUser;
  if (!user) return alert("Войди");

  await addDoc(collection(db, "dm_messages"), {
    from: user.email,
    to: userSelect.value,
    text: dmText.value,
    participants: [user.email, userSelect.value],
    timestamp: serverTimestamp()
  });

  dmText.value = "";
};

// ===== ЧАТ =====
const loadMessages = () => {
  const q = query(collection(db, "dm_messages"), orderBy("timestamp"));

  onSnapshot(q, (snap) => {
    const user = auth.currentUser;
    dmChat.innerHTML = "";

    snap.forEach(doc => {
      const d = doc.data();

      if (!d.participants.includes(user.email)) return;

      const div = document.createElement("div");
      div.innerHTML = `<b>${d.from}</b>: ${d.text}`;
      dmChat.appendChild(div);
    });
  });
};
</script>

</body>
</html>
