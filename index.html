<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Private Cloud Chat</title>
<style>
body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
.container { width: 100%; max-width: 550px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }

/* Шапка профиля */
.profile-card { display: flex; align-items: center; justify-content: space-between; }
.avatar { width: 45px; height: 45px; background: #4CAF50; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; }
.logout-link { color: #ff4d4d; font-size: 12px; cursor: pointer; text-decoration: none; display: block; margin-top: 4px; }

/* Список собеседников */
.user-item { display: flex; align-items: center; padding: 10px; cursor: pointer; border-bottom: 1px solid #f0f0f0; transition: 0.2s; }
.user-item:hover { background: #f9f9f9; }
.user-avatar { width: 35px; height: 35px; background: #00bcd4; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 10px; font-size: 14px; }

/* Окно чата */
.chat-section { display: none; margin-top: 15px; border-top: 1px solid #eee; pt: 15px; }
.chat-window { height: 250px; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: #fff; }
.msg { padding: 8px 14px; border-radius: 18px; font-size: 14px; max-width: 75%; position: relative; }
.msg.in { background: #e9e9eb; align-self: flex-start; }
.msg.out { background: #007bff; color: white; align-self: flex-end; }

/* Поле ввода */
.input-group { display: flex; gap: 8px; margin-top: 10px; border: 1px solid #ddd; padding: 5px; border-radius: 8px; }
.input-group input { border: none; outline: none; flex: 1; padding: 8px; }
.send-btn { background: #007bff; color: white; border: none; border-radius: 6px; width: 40px; cursor: pointer; }

input[type="text"], input[type="email"] { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
#mainBtn { background: #007bff; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; margin-bottom: 5px; }
</style>
</head>
<body>

<div class="container" id="profileBox" style="display:none;">
    <div class="profile-card">
        <div style="display:flex; align-items:center;">
            <div class="avatar" id="myAvatar">?</div>
            <div>
                <b id="myName">Загрузка...</b>
                <span class="logout-link" id="logoutBtn">Выйти</span>
            </div>
        </div>
    </div>
</div>

<div class="container" id="loginBox">
    <button id="loginBtn" style="padding:15px; width:100%; cursor:pointer;">🔐 Войти через Google</button>
</div>

<div class="container" id="formBox" style="display:none;">
    <h3>Напишите анонимно</h3>
    <input type="text" id="postName" placeholder="Имя профиля">
    <input type="email" id="postEmail" placeholder="Рабочий Email">
    <button id="mainBtn">Опубликовать в облако</button>
</div>

<div class="container" id="usersBox" style="display:none;">
    <p style="color:#888; font-size:14px;">Выберите собеседника:</p>
    <div id="usersList"></div>

    <div id="chatSection" class="chat-section">
        <p><b>Чат с: <span id="chatWithTitle">...</span></b></p>
        <div id="chatDisplay" class="chat-window"></div>
        <div class="input-group">
            <input type="text" id="msgInput" placeholder="Ваше сообщение...">
            <button id="sendMsgBtn" class="send-btn">➤</button>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyDj35E4SPS-hxo0ILX2EgnOeO6ccGNc8JI",
    authDomain: "po243-e5610.firebaseapp.com",
    projectId: "po243-e5610",
    storageBucket: "po243-e5610.firebasestorage.app",
    messagingSenderId: "351488478677",
    appId: "1:351488478677:web:f8dc387ace0feaf50c415c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentUser = null;
let activeChatEmail = null;
let chatUnsub = null;

// --- AUTH ---
document.getElementById("loginBtn").onclick = () => signInWithPopup(auth, provider);
document.getElementById("logoutBtn").onclick = () => signOut(auth);

onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUser = user;
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("profileBox").style.display = "block";
        document.getElementById("formBox").style.display = "block";
        document.getElementById("usersBox").style.display = "block";
        
        document.getElementById("myName").innerText = user.displayName || user.email;
        document.getElementById("myAvatar").innerText = (user.displayName || "U")[0].toUpperCase();
        
        loadUsersList();
    } else {
        location.reload();
    }
});

// --- ЗАГРУЗКА СПИСКА ПОЛЬЗОВАТЕЛЕЙ ---
function loadUsersList() {
    const q = query(collection(db, "requests"));
    onSnapshot(q, (snap) => {
        const list = document.getElementById("usersList");
        list.innerHTML = "";
        const added = new Set();

        snap.forEach(doc => {
            const data = doc.data();
            if (data.email !== currentUser.email && !added.has(data.email)) {
                added.add(data.email);
                const item = document.createElement("div");
                item.className = "user-item";
                item.innerHTML = `<div class="user-avatar">${data.name[0]}</div> <div><b>${data.name}</b></div>`;
                item.onclick = () => startChat(data.email, data.name);
                list.appendChild(item);
            }
        });
    });
}

// --- ЛОГИКА ЧАТА ---
function startChat(email, name) {
    activeChatEmail = email;
    document.getElementById("chatSection").style.display = "block";
    document.getElementById("chatWithTitle").innerText = name;
    
    if (chatUnsub) chatUnsub();

    const q = query(
        collection(db, "dm_messages"),
        where("participants", "array-contains", currentUser.email),
        orderBy("timestamp", "asc")
    );

    chatUnsub = onSnapshot(q, (snap) => {
        const display = document.getElementById("chatDisplay");
        display.innerHTML = "";
        snap.forEach(d => {
            const msg = d.data();
            // Фильтруем сообщения именно для этой пары собеседников
            if (msg.participants.includes(activeChatEmail)) {
                const div = document.createElement("div");
                div.className = `msg ${msg.from === currentUser.email ? 'out' : 'in'}`;
                div.innerText = msg.text;
                display.appendChild(div);
            }
        });
        display.scrollTop = display.scrollHeight;
    });
}

document.getElementById("sendMsgBtn").onclick = async () => {
    const text = document.getElementById("msgInput").value.trim();
    if (!text || !activeChatEmail) return;

    await addDoc(collection(db, "dm_messages"), {
        from: currentUser.email,
        to: activeChatEmail,
        text: text,
        participants: [currentUser.email, activeChatEmail],
        timestamp: serverTimestamp()
    });
    document.getElementById("msgInput").value = "";
};

// Сохранение оригинальной функции поста
document.getElementById("mainBtn").onclick = async () => {
    const name = document.getElementById("postName").value;
    const email = document.getElementById("postEmail").value;
    if(name && email) {
        await addDoc(collection(db, "requests"), { name, email, likes: 0, timestamp: serverTimestamp() });
        alert("Опубликовано!");
    }
};
</script>
</body>
</html>
