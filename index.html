<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Status App</title>

<style>
body {
  font-family: Arial;
  background: #f2f2f2;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 320px;
  margin-bottom: 20px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.status-card {
  background: #ffe4ec;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  width: 45%;
}

.list-item {
  display: flex;
  align-items: center;
  margin: 10px 0;
}
</style>
</head>

<body>

<div>

  <!-- МОЙ СТАТУС -->
  <div class="card status-card">
    <h3>Мой статус</h3>
    <p id="me">Загрузка...</p>

    <button style="background:#28a745" onclick="setStatus('Учусь')">Учусь</button>
    <button style="background:#ffc107" onclick="setStatus('Кофе')">Кофе</button><br>
    <button style="background:#17a2b8" onclick="setStatus('В игре')">В игре</button>
    <button style="background:#6c757d" onclick="setStatus('Дома')">Дома</button>
  </div>

  <!-- СПИСОК -->
  <div class="card">
    <h3>Пользователи</h3>
    <div id="list"></div>
  </div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// 🔴 ВСТАВЬ СВОИ ДАННЫЕ
const URL = 'https://pcqynrythvnyikchappl.supabase.co'
const KEY = 'sb_publishable_1YoIc3WsA1ywCxFfkcpdHg_ZWa5I6eN'
const MY_ID = 'd9eeb7aa-2ded-47c5-86de-98377838ea2c'

const supabase = createClient(URL, KEY)
window.supabase = supabase

// 🔄 смена статуса (БЕЗ COLOR)
window.setStatus = async (text) => {

  const { error } = await supabase
    .from('profiles')
    .update({
      status: text
    })
    .eq('id', MY_ID)

  if (error) {
    alert(error.message)
    console.error(error)
  } else {
    load()
  }
}

// 📥 загрузка пользователей
async function load() {

  const { data, error } = await supabase
    .from('profiles')
    .select('*')

  if (error) {
    console.error(error)
    return
  }

  document.getElementById('list').innerHTML =
    data.map(u => `
      <div class="list-item">
        <div>
          <b>${u.username}</b><br>
          <small>${u.status || 'нет статуса'}</small>
        </div>
      </div>
    `).join('')

  const me = data.find(u => u.id === MY_ID)
  if (me) {
    document.getElementById('me').innerText =
      me.username + " — " + me.status
  }
}

load()
setInterval(load, 3000)

</script>

</body>
</html>
