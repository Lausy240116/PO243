<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Анонимные заявки</title>

<style>
body {
  font-family: Inter, sans-serif;
  background: #f4f7f6;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 500px;
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

input, button {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 6px;
  box-sizing: border-box;
}

input {
  border: 1px solid #ddd;
}

button {
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #0056b3;
}

.post {
  background: #fff;
  border: 1px solid #eee;
  padding: 15px;
  margin-top: 10px;
  border-radius: 8px;
  width: 100%;
  max-width: 500px;
  position: relative;
}

.like-btn {
  cursor: pointer;
  border: none;
  background: black;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 14px;
  transition: 0.2s;
}

.like-btn:hover {
  background: #e6e6e6;
}

.time {
  font-size: 11px;
  color: #999;
  float: right;
}
</style>
</head>

<body>

<div class="container">
  <h3>Напишите анонимно</h3>
  <input type="text" id="name" placeholder="Имя профиля">
  <input type="email" id="email" placeholder="Рабочий Email">
  <button id="mainBtn">Опубликовать в облако</button>
</div>

<div id="feed" style="width:100%; max-width:500px;"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, orderBy, onSnapshot,
  serverTimestamp, updateDoc, doc, increment, where
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDj35E4SPS-hxo0ILX2EgnOeO6ccGNc8JI",
  authDomain: "po243-e5610.firebaseapp.com",
  projectId: "po243-e5610",
  storageBucket: "po243-e5610.firebasestorage.app",
  messagingSenderId: "351488478677",
  appId: "1:351488478677:web:f8dc387ace0feaf50c415c",
  measurementId: "G-6SDF3PG9CS"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👍 лайки
window.processLike = async (id) => {
  await updateDoc(doc(db, "requests", id), {
    likes: increment(1)
  });
};

// 💬 добавить комментарий
window.addComment = async (postId) => {
  const text = prompt("Введите комментарий:");
  if (!text) return;

  await addDoc(collection(db, "comments"), {
    postId: postId,
    text: text,
    createdAt: new Date()
  });
};

// 💬 загрузка комментариев
function loadComments(postId, containerId) {
  const q = query(
    collection(db, "comments"),
    where("postId", "==", postId)
  );

  onSnapshot(q, (snapshot) => {
    const el = document.getElementById(containerId);
    if (!el) return;

    if (snapshot.empty) {
      el.innerHTML = "<i>Комментариев нет</i>";
      return;
    }

    el.innerHTML = snapshot.docs.map(doc => `
      <div style="
        background:#f1f1f1;
        padding:6px;
        margin-top:5px;
        border-radius:5px;
      ">
        💬 ${doc.data().text}
      </div>
    `).join('');
  });
}

// 📡 посты
const qPosts = query(collection(db, "requests"), orderBy("timestamp", "desc"));

onSnapshot(qPosts, (snapshot) => {
  const feed = document.getElementById("feed");

  feed.innerHTML = snapshot.docs.map(docItem => {
    const data = docItem.data();
    const timeStr = data.timestamp?.toDate
      ? data.timestamp.toDate().toLocaleTimeString()
      : "...";

    return `
      <div class="post">
        <span class="time">${timeStr}</span>
        <b>${data.name}</b>
        <p style="margin:5px 0;">${data.email}</p>

        <button class="like-btn" onclick="processLike('${docItem.id}')">
          👍 ${data.likes || 0}
        </button>

        <button onclick="addComment('${docItem.id}')">💬</button>

        <div id="comments-${docItem.id}"></div>
      </div>
    `;
  }).join('');

  // подключаем комментарии
  snapshot.docs.forEach(docItem => {
    loadComments(docItem.id, "comments-" + docItem.id);
  });
});

// ➕ добавление поста
document.getElementById("mainBtn").onclick = async () => {
  const btn = document.getElementById("mainBtn");
  btn.disabled = true;

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();

  if (!name || !email) {
    alert("Введите имя и email!");
    btn.disabled = false;
    return;
  }

  await addDoc(collection(db, "requests"), {
    name,
    email,
    likes: 0,
    timestamp: serverTimestamp()
  });

  document.getElementById("name").value = "";
  document.getElementById("email").value = "";
  btn.disabled = false;
};
</script>

</body>
</html>
