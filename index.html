<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Анонимные заявки</title>

<style>
body {
  font-family: Inter, sans-serif;
  background: #f4f7f6;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 500px;
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

input, button {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 6px;
  box-sizing: border-box;
}

input {
  border: 1px solid #ddd;
}

button {
  background: #007bff;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

.post {
  background: #fff;
  border: 1px solid #eee;
  padding: 15px;
  margin-top: 10px;
  border-radius: 8px;
}

.like-btn {
  cursor: pointer;
  border: none;
  background: black;
  color: white;
  padding: 5px 12px;
  border-radius: 20px;
}

.time {
  font-size: 11px;
  color: #999;
  float: right;
}
</style>
</head>

<body>

<div class="container">
  <h3>Напишите анонимно</h3>
  <input type="text" id="name" placeholder="Имя профиля">
  <input type="email" id="email" placeholder="Email">
  <button id="mainBtn">Опубликовать</button>
</div>

<div id="feed" style="width:100%; max-width:500px;"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, orderBy, onSnapshot,
  serverTimestamp, updateDoc, doc, increment, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

// CONFIG
const firebaseConfig = {
  apiKey: "ТВОЙ_API_KEY",
  authDomain: "ТВОЙ_AUTH_DOMAIN",
  projectId: "ТВОЙ_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 👇 ДЕЛАЕМ ДОСТУП В КОНСОЛЬ
window.db = db;
window.updateDoc = updateDoc;
window.deleteDoc = deleteDoc;
window.docRef = doc;

// лайки
window.processLike = async (id) => {
  const ref = doc(db, "requests", id);
  await updateDoc(ref, {
    likes: increment(1)
  });
};

// отправка
document.getElementById("mainBtn").onclick = async () => {
  await addDoc(collection(db, "requests"), {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    likes: 0,
    timestamp: serverTimestamp()
  });
};

// вывод
const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));

onSnapshot(q, (snapshot) => {
  const feed = document.getElementById("feed");
  feed.innerHTML = "";

  snapshot.forEach((docItem) => {
    console.log("ID:", docItem.id); // 👈 ВАЖНО

    const data = docItem.data();

    feed.innerHTML += `
      <div class="post">
        <span class="time">${data.timestamp ? data.timestamp.toDate().toLocaleTimeString() : ""}</span>
        <b>${data.name}</b>
        <p>${data.email}</p>
        <button class="like-btn" onclick="processLike('${docItem.id}')">
          👍 ${data.likes || 0}
        </button>
      </div>
    `;
  });
});
</script>

</body>
</html>
