<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Статус</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 320px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      width: 45%;
    }

    .list-item {
      display: flex;
      align-items: center;
      margin: 10px 0;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 10px;
    }
  </style>
</head>
<body>

<div>
  <div class="card">
    <h3>Мой профиль</h3>
    <p id="myInfo"></p>

    <button onclick="changeStatus('Учусь','#28a745')">Учусь</button>
    <button onclick="changeStatus('Кофе','#ffc107')">Кофе</button><br>
    <button onclick="changeStatus('В игре','#17a2b8')">В игре</button>
    <button onclick="changeStatus('Дома','#6c757d')">Дома</button>
  </div>

  <div class="card">
    <h3>Монитор группы</h3>
    <div id="groupList"></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

// 🔴 ВСТАВЬ СВОИ ДАННЫЕ
const URL = 'https://pcqynrythvnyikchappl.supabase.co'
const KEY = 'sb_publishable_1YoIc3WsA1ywCxFfkcpdHg_ZWa5I6eN'

// 🔴 ТВОЙ СУЩЕСТВУЮЩИЙ ID
const MY_ID = 'd9eeb7aa-2ded-47c5-86de-98377838ea2c'

const supabase = createClient(URL, KEY)

// ---- смена статуса ----
window.changeStatus = async (text, color) => {
  const { error } = await supabase
    .from('profiles')
    .update({ status: text, color: color })
    .eq('id', MY_ID)

  if (error) {
    alert('Ошибка записи в базу')
    console.error(error)
  } else {
    fetchGroup()
  }
}

// ---- загрузка списка ----
async function fetchGroup() {
  const { data, error } = await supabase
    .from('profiles')
    .select('*')
    .order('username', { ascending: true })

  if (error) {
    console.error(error)
    return
  }

  const list = document.getElementById('groupList')

  list.innerHTML = data.map(user => `
    <div class="list-item">
      <div class="dot" style="background:${user.color || '#ccc'}"></div>
      <div>
        <b>${user.username}</b><br>
        <small>${user.status || 'нет статуса'}</small>
      </div>
    </div>
  `).join('')

  // 👇 показываем себя
  const me = data.find(u => u.id === MY_ID)
  if (me) {
    document.getElementById('myInfo').innerText =
      `Вы зашли как: ${me.username}`
  }
}

// ---- запуск ----
fetchGroup()

// автообновление
setInterval(fetchGroup, 3000)

</script>

</body>
</html>
